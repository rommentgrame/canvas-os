<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Canvas OS - Ultimate Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
    --bg: #030305;
    --panel: #0a0a12;
    --accent: #007bff;
    --accent-glow: rgba(0, 123, 255, 0.4);
    --border: #1a1a2e;
    --text: #ffffff;
    --text-dim: #94a3b8;
    --node-bg: rgba(15, 15, 25, 0.9);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
    width: 100%; height: 100%; overflow: hidden; 
    background: var(--bg); 
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
}

#root { width: 100%; height: 100%; }

/* Amélioration de la visibilité des textes */
input, textarea, button { 
    font-family: 'DM Sans', sans-serif; 
    color: white;
}

/* Scrollbar personnalisée et visible */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #050505; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; border: 2px solid #050505; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Animation des nœuds */
.node-enter { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.grid-bg {
    background-image: 
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
}

.glass-morphism {
    background: var(--node-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

/* Styles pour le texte pour qu'il "pop" sur le noir */
.text-glow {
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// --- CONFIGURATION ET THEMES ---
const COLORS = {
    blue: "#007aff", green: "#34c759", red: "#ff3b30", 
    yellow: "#ffcc00", purple: "#af52de", orange: "#ff9500"
};

const NODE_TYPES = {
    NOTE: { id: 'note', label: 'Note', icon: '📝', color: COLORS.blue },
    TODO: { id: 'todo', label: 'Tâches', icon: '✅', color: COLORS.green },
    CODE: { id: 'code', label: 'Code', icon: '💻', color: COLORS.purple },
    SKETCH: { id: 'sketch', label: 'Dessin', icon: '🎨', color: COLORS.orange },
    CLOCK: { id: 'clock', label: 'Horloge', icon: '⏰', color: COLORS.yellow },
    WEB: { id: 'web', label: 'Navigateur', icon: '🌐', color: COLORS.blue }
};

// --- COMPOSANTS DE BASE ---

const IconButton = ({ icon, onClick, color = "white", size = "16px" }) => (
    <button onClick={onClick} style={{
        background: 'none', border: 'none', cursor: 'pointer',
        fontSize: size, color: color, padding: '4px',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        borderRadius: '4px', transition: 'background 0.2s'
    }} onMouseEnter={e => e.target.style.background = 'rgba(255,255,255,0.1)'}
       onMouseLeave={e => e.target.style.background = 'none'}>
        {icon}
    </button>
);

// --- WIDGETS SPÉCIFIQUES ---

const SketchPad = () => {
    const canvasRef = useRef(null);
    const [isDrawing, setIsDrawing] = useState(false);

    useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#007aff';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
    }, []);

    const startDrawing = (e) => {
        const { offsetX, offsetY } = e.nativeEvent;
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(offsetX, offsetY);
        setIsDrawing(true);
    };

    const draw = (e) => {
        if (!isDrawing) return;
        const { offsetX, offsetY } = e.nativeEvent;
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(offsetX, offsetY);
        ctx.stroke();
    };

    return (
        <canvas 
            ref={canvasRef}
            width="300" height="200"
            style={{ width: '100%', height: '100%', background: '#111', cursor: 'crosshair' }}
            onMouseDown={startDrawing}
            onMouseMove={draw}
            onMouseUp={() => setIsDrawing(false)}
        />
    );
};

// --- LE COMPOSANT NOEUD (TA LOGIQUE ORIGINALE AMÉLIORÉE) ---

const Node = ({ node, isSelected, onSelect, onUpdate, onDelete }) => {
    const [dragging, setDragging] = useState(false);
    const [pos, setPos] = useState({ x: node.x, y: node.y });
    const offset = useRef({ x: 0, y: 0 });

    const handleMouseDown = (e) => {
        if (e.target.closest('.no-drag')) return;
        onSelect(node.id);
        setDragging(true);
        offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y };
    };

    useEffect(() => {
        if (!dragging) return;
        const move = (e) => {
            const newX = e.clientX - offset.current.x;
            const newY = e.clientY - offset.current.y;
            setPos({ x: newX, y: newY });
            onUpdate(node.id, { x: newX, y: newY });
        };
        const up = () => setDragging(false);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
        return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    }, [dragging]);

    return (
        <div 
            className="glass-morphism node-enter"
            style={{
                position: 'absolute', left: pos.x, top: pos.y,
                width: node.w || 300, height: node.h || 250,
                zIndex: isSelected ? 100 : 10,
                borderRadius: '12px', overflow: 'hidden',
                border: isSelected ? `2px solid ${NODE_TYPES[node.type].color}` : '1px solid var(--border)',
                display: 'flex', flexDirection: 'column'
            }}
            onMouseDown={handleMouseDown}
        >
            {/* Header */}
            <div style={{
                padding: '10px 15px', background: 'rgba(255,255,255,0.05)',
                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                borderBottom: '1px solid var(--border)'
            }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <span>{NODE_TYPES[node.type].icon}</span>
                    <span style={{ fontWeight: '600', fontSize: '13px', color: 'white' }}>{node.title || node.type}</span>
                </div>
                <div className="no-drag" style={{ display: 'flex', gap: '5px' }}>
                    <IconButton icon="×" color="#ff4444" onClick={() => onDelete(node.id)} />
                </div>
            </div>

            {/* Content */}
            <div className="no-drag" style={{ flex: 1, padding: '15px', overflowY: 'auto' }}>
                {node.type === 'NOTE' && (
                    <textarea 
                        style={{ width: '100%', height: '100%', background: 'transparent', border: 'none', color: 'white', resize: 'none', outline: 'none', fontSize: '14px', lineHeight: '1.5' }}
                        value={node.content}
                        placeholder="Écrivez quelque chose..."
                        onChange={(e) => onUpdate(node.id, { content: e.target.value })}
                    />
                )}
                {node.type === 'SKETCH' && <SketchPad />}
                {node.type === 'CLOCK' && (
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100%' }}>
                        <div style={{ fontSize: '3rem', fontWeight: '800', color: COLORS.yellow }}>
                            {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </div>
                        <div style={{ color: 'var(--text-dim)' }}>{new Date().toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' })}</div>
                    </div>
                )}
                {node.type === 'CODE' && (
                    <pre style={{ fontFamily: 'DM Mono', fontSize: '12px', color: '#a5d6ff' }}>
                        <code>{`// Canvas OS Script\nfunction init() {\n  console.log("System Ready");\n}`}</code>
                    </pre>
                )}
            </div>
        </div>
    );
};

// --- APP PRINCIPALE ---

const App = () => {
    const [nodes, setNodes] = useState([
        { id: '1', type: 'NOTE', x: 100, y: 100, w: 300, h: 200, content: 'Bienvenue dans ton nouveau Canvas ! Plus lisible et plus puissant.' },
        { id: '2', type: 'CLOCK', x: 500, y: 100, w: 250, h: 150 }
    ]);
    const [selId, setSelId] = useState(null);

    const addNode = (type) => {
        const newNode = {
            id: Date.now().toString(),
            type,
            x: 50 + Math.random() * 200,
            y: 50 + Math.random() * 200,
            w: 300, h: 250,
            content: ''
        };
        setNodes([...nodes, newNode]);
    };

    const updateNode = (id, data) => {
        setNodes(prev => prev.map(n => n.id === id ? { ...n, ...data } : n));
    };

    const deleteNode = (id) => {
        setNodes(prev => prev.filter(n => n.id !== id));
    };

    return (
        <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column' }}>
            {/* BARRE DE MENU */}
            <nav className="glass-morphism" style={{ height: '60px', zHeader: 1000, display: 'flex', alignItems: 'center', padding: '0 25px', justifyContent: 'space-between', borderBottom: '1px solid var(--border)' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '20px' }}>
                    <div style={{ fontSize: '20px', fontWeight: '800', letterSpacing: '-1px' }}>
                        CANVAS <span style={{ color: var(--accent) }}>OS</span>
                    </div>
                    <div style={{ width: '1px', height: '24px', background: 'var(--border)' }}></div>
                    <div style={{ display: 'flex', gap: '8px' }}>
                        {Object.values(NODE_TYPES).map(t => (
                            <button key={t.id} onClick={() => addNode(t.id.toUpperCase())} style={{
                                background: 'rgba(255,255,255,0.05)', border: '1px solid var(--border)',
                                color: 'white', padding: '6px 12px', borderRadius: '6px', cursor: 'pointer',
                                fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px'
                            }}>
                                <span>{t.icon}</span> {t.label}
                            </button>
                        ))}
                    </div>
                </div>
            </nav>

            {/* ZONE DE TRAVAIL */}
            <main className="grid-bg" style={{ flex: 1, position: 'relative', overflow: 'hidden' }}>
                {nodes.map(n => (
                    <Node 
                        key={n.id} 
                        node={n} 
                        isSelected={selId === n.id}
                        onSelect={setSelId}
                        onUpdate={updateNode}
                        onDelete={deleteNode}
                    />
                ))}
            </main>

            {/* BARRE D'ETAT */}
            <footer style={{ height: '35px', background: '#000', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 20px', justifyContent: 'space-between' }}>
                <div style={{ fontSize: '11px', color: 'var(--text-dim)', display: 'flex', gap: '15px' }}>
                    <span>SYSTÈME : OPÉRATIONNEL</span>
                    <span>NOEUDS : {nodes.length}</span>
                </div>
                <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>
                    {new Date().toLocaleDateString()}
                </div>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
