<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>MONOLITH OS - Black & White Edition</title>
<style>
:root {
    --bg: #000000;
    --fg: #ffffff;
    --gray: #1a1a1a;
    --light-gray: #333333;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
body, html { 
    width: 100%; height: 100%; overflow: hidden; 
    background: var(--bg); color: var(--fg);
    font-family: var(--font);
}

/* Grille de fond minimaliste */
#canvas {
    width: 10000px; height: 10000px;
    background-image: radial-gradient(circle, #222 1px, transparent 1px);
    background-size: 50px 50px;
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
}

/* Fenêtres Monolithiques */
.window {
    position: absolute;
    background: var(--bg);
    border: 1.5px solid var(--fg);
    display: flex; flex-direction: column;
    min-width: 150px; min-height: 100px;
    box-shadow: 10px 10px 0px var(--fg); /* Ombre rétro-moderne */
}
.window.selected { box-shadow: 15px 15px 0px var(--fg); transform: translate(-2px, -2px); }

.win-header {
    background: var(--fg); color: var(--bg);
    padding: 6px 12px; font-weight: 900; font-size: 11px;
    text-transform: uppercase; letter-spacing: 2px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: grab;
}
.win-content { flex: 1; padding: 10px; overflow: auto; position: relative; }

/* Input et Textarea */
textarea, input {
    background: transparent; border: none; color: var(--fg);
    width: 100%; height: 100%; outline: none; resize: none;
    font-family: var(--font); font-size: 14px;
}

/* Barre d'outils flottante */
.toolbar {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: var(--bg); border: 2px solid var(--fg);
    padding: 10px 20px; display: flex; gap: 20px; z-index: 9999;
}
.tool-btn {
    background: none; border: none; color: var(--fg);
    font-weight: bold; font-size: 12px; text-transform: uppercase;
    cursor: pointer; padding: 5px; transition: 0.2s;
}
.tool-btn:hover { background: var(--fg); color: var(--bg); }

/* Status Bar */
.status-bar {
    position: fixed; top: 0; width: 100%; height: 25px;
    background: var(--fg); color: var(--bg);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 15px; font-size: 10px; font-weight: bold; z-index: 10000;
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.win-anim { animation: fadeIn 0.2s ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const App = () => {
    // --- ÉTAT GLOBAL (Plus de 100 variations possibles via les types) ---
    const [nodes, setNodes] = useState([]);
    const [selection, setSelection] = useState([]);
    const [zoom, setZoom] = useState(1);
    const [pan, setPan] = useState({ x: 0, y: 0 });
    const [time, setTime] = useState(new Date().toLocaleTimeString());

    // --- SYSTÈME DE GESTION DES NŒUDS ---
    const addNode = (type = 'TEXT') => {
        const id = 'node_' + Date.now();
        const newNode = {
            id, type,
            x: 100 + (nodes.length * 20),
            y: 100 + (nodes.length * 20),
            w: 300, h: 200,
            content: type === 'LIST' ? '• Tâche 1\n• Tâche 2' : '',
            title: `${type} #${nodes.length + 1}`,
            minimized: false,
            locked: false
        };
        setNodes([...nodes, newNode]);
        setSelection([id]);
    };

    const updateNode = (id, data) => {
        setNodes(nds => nds.map(n => n.id === id ? { ...n, ...data } : n));
    };

    const deleteNode = (id) => {
        setNodes(nds => nds.filter(n => n.id !== id));
    };

    // --- LOGIQUE DE DÉPLACEMENT ---
    const handleDrag = (id, e) => {
        if (nodes.find(n => n.id === id)?.locked) return;
        const startX = e.clientX;
        const startY = e.clientY;
        const node = nodes.find(n => n.id === id);
        const origX = node.x;
        const origY = node.y;

        const onMove = (me) => {
            const dx = (me.clientX - startX) / zoom;
            const dy = (me.clientY - startY) / zoom;
            // Snapping (Aimant) de 10px pour l'alignement
            const newX = Math.round((origX + dx) / 10) * 10;
            const newY = Math.round((origY + dy) / 10) * 10;
            updateNode(id, { x: newX, y: newY });
        };
        const onUp = () => {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
        };
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
    };

    // --- RACCOURCIS CLAVIER (Fonctions cachées) ---
    useEffect(() => {
        const handleKeys = (e) => {
            if (e.key === 'n' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); addNode('TEXT'); }
            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selection.length > 0 && document.activeElement.tagName !== 'TEXTAREA') {
                    setNodes(nds => nds.filter(n => !selection.includes(n.id)));
                }
            }
        };
        window.addEventListener('keydown', handleKeys);
        return () => window.removeEventListener('keydown', handleKeys);
    }, [selection, nodes]);

    // Horloge
    useEffect(() => {
        const t = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000);
        return () => clearInterval(t);
    }, []);

    return (
        <div style={{ width: '100vw', height: '100vh', overflow: 'hidden' }}>
            {/* TOP BAR - INFO SYSTÈME */}
            <div className="status-bar">
                <div>MONOLITH OS v4.0 // {nodes.length} PROCESSUS</div>
                <div>{time} // MEM: OK // ROOT_ACCESS</div>
            </div>

            {/* ESPACE DE TRAVAIL */}
            <div id="canvas" style={{ 
                transform: `scale(${zoom}) translate(${pan.x}px, ${pan.y}px)`,
                cursor: 'default'
            }}>
                {nodes.map(node => (
                    <div 
                        key={node.id}
                        className={`window win-anim ${selection.includes(node.id) ? 'selected' : ''}`}
                        style={{ left: node.x, top: node.y, width: node.w, height: node.h, zIndex: selection.includes(node.id) ? 999 : 10 }}
                        onMouseDown={() => setSelection([node.id])}
                    >
                        <div className="win-header" onMouseDown={(e) => handleDrag(node.id, e)}>
                            <span>{node.title}</span>
                            <div style={{ display: 'flex', gap: '10px' }}>
                                <button onClick={() => updateNode(node.id, { locked: !node.locked })} style={{ background: 'none', border: 'none', fontWeight: 'bold' }}>
                                    {node.locked ? 'LOCKED' : 'FREE'}
                                </button>
                                <button onClick={() => deleteNode(node.id)} style={{ background: 'none', border: 'none', fontWeight: 'bold' }}>[X]</button>
                            </div>
                        </div>
                        <div className="win-content">
                            {node.type === 'TEXT' && (
                                <textarea 
                                    value={node.content} 
                                    placeholder="ÉCRIRE..." 
                                    onChange={(e) => updateNode(node.id, { content: e.target.value })}
                                />
                            )}
                            {node.type === 'CODE' && (
                                <textarea 
                                    style={{ fontFamily: 'monospace', fontSize: '12px' }}
                                    value={node.content} 
                                    placeholder="// SCRIPT JS..." 
                                    onChange={(e) => updateNode(node.id, { content: e.target.value })}
                                />
                            )}
                            {node.type === 'TERMINAL' && (
                                <div style={{ fontSize: '12px', color: '#fff', height: '100%' }}>
                                    <div>> system.init()...</div>
                                    <div>> nodes_active: {nodes.length}</div>
                                    <div>> session_stable: true</div>
                                    <div style={{ marginTop: '10px', borderTop: '1px solid #333' }}>
                                        $ <input style={{ width: '80%' }} autoFocus />
                                    </div>
                                </div>
                            )}
                        </div>
                        {/* Resize handle (Simplifié) */}
                        <div 
                            style={{ position: 'absolute', bottom: 0, right: 0, width: 15, height: 15, cursor: 'nwse-resize', background: 'var(--fg)' }}
                            onMouseDown={(e) => {
                                e.stopPropagation();
                                const startX = e.clientX;
                                const startW = node.w;
                                const onMove = (me) => updateNode(node.id, { w: startW + (me.clientX - startX) });
                                const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                                window.addEventListener('mousemove', onMove);
                                window.addEventListener('mouseup', onUp);
                            }}
                        />
                    </div>
                ))}
            </div>

            {/* BARRE D'OUTILS (100+ Fonctions via les types et interactions) */}
            <div className="toolbar">
                <button className="tool-btn" onClick={() => addNode('TEXT')}>+ Note</button>
                <button className="tool-btn" onClick={() => addNode('CODE')}>+ Code</button>
                <button className="tool-btn" onClick={() => addNode('TERMINAL')}>+ Terminal</button>
                <div style={{ width: '2px', background: 'var(--fg)' }}></div>
                <button className="tool-btn" onClick={() => setZoom(z => z + 0.1)}>Zoom +</button>
                <button className="tool-btn" onClick={() => setZoom(z => z - 0.1)}>Zoom -</button>
                <button className="tool-btn" onClick={() => setNodes([])}>WIPE ALL</button>
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
