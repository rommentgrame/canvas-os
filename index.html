<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>MONOLITH OS - ULTIMATE BLACK & WHITE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --br: #ffffff;
            --accent: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--bg); color: var(--fg);
            font-family: var(--font-main);
        }

        /* --- INTERFACE CORE --- */
        #desktop {
            width: 100vw; height: 100vh;
            position: relative;
            background-image: 
                linear-gradient(to right, #111 1px, transparent 1px),
                linear-gradient(to bottom, #111 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
        }

        /* --- FENETRES MONOLITH --- */
        .win {
            position: absolute;
            background: var(--bg);
            border: 2px solid var(--fg);
            display: flex;
            flex-direction: column;
            box-shadow: 8px 8px 0px rgba(255,255,255,0.2);
            transition: box-shadow 0.1s;
            min-width: 200px; min-height: 150px;
        }
        .win.active {
            box-shadow: 12px 12px 0px var(--fg);
            z-index: 1000 !important;
        }

        .win-bar {
            background: var(--fg);
            color: var(--bg);
            padding: 8px 12px;
            font-family: var(--font-mono);
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .win-btn-group { display: flex; gap: 8px; }
        .win-btn {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--bg);
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 10px;
        }
        .win-btn:hover { background: var(--bg); color: var(--fg); border-color: var(--bg); }

        .win-body {
            flex: 1;
            overflow: auto;
            padding: 10px;
            background: var(--bg);
            position: relative;
        }

        /* --- COMPOSANTS INTERNES --- */
        textarea {
            width: 100%; height: 100%;
            background: transparent; border: none;
            color: var(--fg); resize: none;
            font-family: var(--font-main); font-size: 14px;
            line-height: 1.6;
        }

        .terminal {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--fg);
            background: #000;
        }

        .btn-ui {
            background: var(--bg);
            border: 1px solid var(--fg);
            color: var(--fg);
            padding: 5px 12px;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-ui:hover { background: var(--fg); color: var(--bg); }

        /* --- TASKBAR --- */
        #taskbar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 40px; background: var(--bg);
            border-top: 2px solid var(--fg);
            display: flex; align-items: center; padding: 0 15px;
            gap: 20px; z-index: 9999;
        }
        .sys-clock { font-family: var(--font-mono); font-weight: bold; font-size: 13px; }

        /* --- DESSIN --- */
        canvas.drawing-area { background: #000; cursor: crosshair; }

        /* --- UTILS --- */
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--fg); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- CONSTANTES & LOGIQUE SYSTEME ---
        const WIDGETS = {
            TEXT: { title: "Note.txt", w: 400, h: 300, icon: "📄" },
            CODE: { title: "Script.js", w: 500, h: 400, icon: "💻" },
            TERMINAL: { title: "Terminal", w: 600, h: 350, icon: ">_" },
            DRAW: { title: "Canvas.draw", w: 400, h: 400, icon: "🎨" },
            CALC: { title: "Calc.exe", w: 220, h: 320, icon: "±" },
            TODO: { title: "Tasks.list", w: 300, h: 400, icon: "✓" },
            CLOCK: { title: "WorldClock", w: 250, h: 150, icon: "🕒" }
        };

        // --- COMPOSANTS WIDGETS ---

        const TerminalWidget = ({ onAddNode }) => {
            const [history, setHistory] = useState(["> MONOLITH OS - Version 1.0.0", "> Tapez 'help' pour voir les commandes."]);
            const [input, setInput] = useState("");

            const execute = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.toLowerCase().trim();
                    let response = `> Command '${cmd}' not found.`;
                    
                    if (cmd === 'help') response = "> Cmds: note, draw, code, clear, system, exit, color-inv";
                    if (cmd === 'note') { onAddNode('TEXT'); response = "> Note created."; }
                    if (cmd === 'clear') { setHistory([]); setInput(""); return; }
                    if (cmd === 'system') response = `> CPU: OK | RAM: 1.2GB Free | DISK: 88%`;
                    
                    setHistory([...history, `$ ${input}`, response]);
                    setInput("");
                }
            };

            return (
                <div className="terminal">
                    {history.map((h, i) => <div key={i}>{h}</div>)}
                    <div style={{display:'flex'}}>
                        <span>$ &nbsp;</span>
                        <input 
                            className="terminal" 
                            style={{border:'none', outline:'none', flex:1}} 
                            value={input} 
                            onChange={e => setInput(e.target.value)}
                            onKeyDown={execute}
                            autoFocus
                        />
                    </div>
                </div>
            );
        };

        const DrawWidget = () => {
            const canvasRef = useRef(null);
            const [drawing, setDrawing] = useState(false);

            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            }, []);

            const draw = (e) => {
                if (!drawing) return;
                const ctx = canvasRef.current.getContext('2d');
                const rect = canvasRef.current.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
            };

            return (
                <div style={{height:'100%', display:'flex', flexDirection:'column'}}>
                    <div style={{marginBottom:5, display:'flex', gap:5}}>
                        <button className="btn-ui" onClick={() => {
                            const ctx = canvasRef.current.getContext('2d');
                            ctx.clearRect(0, 0, 1000, 1000);
                        }}>Nettoyer</button>
                    </div>
                    <canvas 
                        ref={canvasRef} 
                        width="800" height="800" 
                        className="drawing-area"
                        onMouseDown={(e) => { setDrawing(true); canvasRef.current.getContext('2d').beginPath(); }}
                        onMouseMove={draw}
                        onMouseUp={() => setDrawing(false)}
                    />
                </div>
            );
        };

        // --- CORE APPLICATION ---

        const App = () => {
            const [windows, setWindows] = useState([
                { id: '1', type: 'TERMINAL', x: 50, y: 50, w: 600, h: 350, z: 10, active: true }
            ]);
            const [time, setTime] = useState(new Date().toLocaleTimeString());
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const i = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000);
                return () => clearInterval(i);
            }, []);

            const addWindow = (type) => {
                const id = Date.now().toString();
                const config = WIDGETS[type];
                setWindows([...windows.map(w => ({...w, active: false})), {
                    id, type, x: 100 + (windows.length * 20), y: 100 + (windows.length * 20),
                    w: config.w, h: config.h, z: windows.length + 100, active: true, content: ""
                }]);
                setIsMenuOpen(false);
            };

            const updateWin = (id, data) => setWindows(ws => ws.map(w => w.id === id ? {...w, ...data} : w));
            const closeWin = (id) => setWindows(ws => ws.filter(w => w.id !== id));
            
            const focusWin = (id) => {
                setWindows(ws => ws.map(w => ({
                    ...w, 
                    active: w.id === id,
                    z: w.id === id ? Math.max(...ws.map(win => win.z)) + 1 : w.z
                })));
            };

            const handleDrag = (id, e) => {
                focusWin(id);
                const win = windows.find(w => w.id === id);
                const startX = e.clientX - win.x;
                const startY = e.clientY - win.y;

                const move = (me) => {
                    // Snapping à 10px
                    const nx = Math.round((me.clientX - startX) / 10) * 10;
                    const ny = Math.round((me.clientY - startY) / 10) * 10;
                    updateWin(id, { x: nx, y: ny });
                };
                const stop = () => {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
            };

            return (
                <div id="desktop">
                    {/* WINDOWS RENDERER */}
                    {windows.map(win => (
                        <div 
                            key={win.id} 
                            className={`win ${win.active ? 'active' : ''}`}
                            style={{ 
                                left: win.x, top: win.y, 
                                width: win.w, height: win.h, 
                                zIndex: win.z 
                            }}
                            onMouseDown={() => focusWin(win.id)}
                        >
                            <div className="win-bar" onMouseDown={(e) => handleDrag(win.id, e)}>
                                <span>{WIDGETS[win.type].icon} {WIDGETS[win.type].title}</span>
                                <div className="win-btn-group">
                                    <button className="win-btn" onClick={() => updateWin(win.id, {w: 800, h: 600})}>□</button>
                                    <button className="win-btn" onClick={() => closeWin(win.id)}>×</button>
                                </div>
                            </div>
                            <div className="win-body">
                                {win.type === 'TEXT' && <textarea placeholder="Note..." value={win.content} onChange={e => updateWin(win.id, {content: e.target.value})} />}
                                {win.type === 'TERMINAL' && <TerminalWidget onAddNode={addWindow} />}
                                {win.type === 'DRAW' && <DrawWidget />}
                                {win.type === 'CLOCK' && (
                                    <div style={{textAlign:'center', paddingTop:20}}>
                                        <h2 style={{fontSize:40, fontFamily:'JetBrains Mono'}}>{time}</h2>
                                        <p>UTC {new Date().getTimezoneOffset()/60}</p>
                                    </div>
                                )}
                                {win.type === 'TODO' && (
                                    <div style={{fontFamily:'JetBrains Mono'}}>
                                        <h3>TASKS:</h3>
                                        <textarea placeholder="1. Design OS&#10;2. Fix Bugs..." />
                                    </div>
                                )}
                            </div>
                            {/* RESIZE HANDLE */}
                            <div 
                                style={{position:'absolute', bottom:0, right:0, width:15, height:15, cursor:'nwse-resize', background:'var(--fg)'}}
                                onMouseDown={(e) => {
                                    e.stopPropagation();
                                    const startW = win.w; const startH = win.h;
                                    const startX = e.clientX; const startY = e.clientY;
                                    const rs = (me) => updateWin(win.id, { w: startW + (me.clientX-startX), h: startH + (me.clientY-startY) });
                                    const rstop = () => { window.removeEventListener('mousemove', rs); window.removeEventListener('mouseup', rstop); };
                                    window.addEventListener('mousemove', rs); window.addEventListener('mouseup', rstop);
                                }}
                            />
                        </div>
                    ))}

                    {/* MENU DEMARRER */}
                    {isMenuOpen && (
                        <div className="win" style={{position:'fixed', bottom:50, left:10, width:200, zIndex:10000, padding:10}}>
                            <div style={{display:'flex', flexDirection:'column', gap:8}}>
                                {Object.keys(WIDGETS).map(k => (
                                    <button key={k} className="btn-ui" onClick={() => addWindow(k)}>{WIDGETS[k].icon} {WIDGETS[k].title}</button>
                                ))}
                                <hr style={{borderColor:'#333'}} />
                                <button className="btn-ui" style={{color:'#ff4444'}} onClick={() => setWindows([])}>Wipe Memory</button>
                            </div>
                        </div>
                    )}

                    {/* TASKBAR */}
                    <footer id="taskbar">
                        <button className="btn-ui" style={{fontWeight:'bold'}} onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            {isMenuOpen ? "CLOSE" : "START"}
                        </button>
                        <div style={{flex:1, display:'flex', gap:10}}>
                            {windows.map(w => (
                                <button 
                                    key={w.id} 
                                    className="btn-ui" 
                                    style={{borderColor: w.active ? '#fff' : '#444'}}
                                    onClick={() => focusWin(w.id)}
                                >
                                    {WIDGETS[w.type].icon}
                                </button>
                            ))}
                        </div>
                        <div className="sys-clock">{time}</div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
