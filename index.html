<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Canvas OS - Pro Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-deep: #050508;
            --bg-panel: #0d0d14;
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.3);
            --text-main: #e2e2e9;
            --text-dim: #8b8b9e;
            --border: #1f1f2e;
            --danger: #ff4d4d;
            --success: #00e676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--bg-deep); 
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }

        #root { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* Scrollbar Style */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Animations */
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
            100% { box-shadow: 0 0 5px var(--accent-glow); }
        }

        .node-selected {
            border: 2px solid var(--accent) !important;
            animation: glow 2s infinite ease-in-out;
        }

        .canvas-grid {
            background-image: 
                radial-gradient(circle, rgba(124, 77, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .glass {
            background: rgba(13, 13, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* --- LOGIQUE ET CONSTANTES --- */
const NODE_TYPES = {
    TEXT: { label: 'Texte', icon: 'Type', color: '#7c4dff' },
    NOTE: { label: 'Post-it', icon: 'StickyNote', color: '#ffc107' },
    IMAGE: { label: 'Média', icon: 'Image', color: '#00e676' },
    CODE: { label: 'Script', icon: 'Code', color: '#00bcd4' },
    CLOCK: { label: 'Horloge', icon: 'Clock', color: '#ff5722' },
    TABLE: { label: 'Données', icon: 'Table', color: '#e91e63' }
};

const generateId = () => `node_${Math.random().toString(36).substr(2, 9)}`;

/* --- COMPOSANTS UI RÉUTILISABLES --- */
const Icon = ({ name, size = 18, color = "currentColor" }) => {
    // Utilisation de Lucide Icons (simulation via SVG pour l'exemple)
    return <i data-lucide={name} style={{ width: size, height: size, color }}></i>;
};

/* --- COMPOSANT NODE (L'unité de base) --- */
const CanvasNode = ({ node, isSelected, onSelect, onUpdate, onDrag }) => {
    const nodeRef = useRef(null);
    const [isDragging, setIsDragging] = useState(false);

    const handleMouseDown = (e) => {
        if (e.target.closest('.no-drag')) return;
        setIsDragging(true);
        onSelect(node.id, e.shiftKey);
        
        const startX = e.clientX - node.x;
        const startY = e.clientY - node.y;

        const onMouseMove = (moveEvent) => {
            onDrag(node.id, moveEvent.clientX - startX, moveEvent.clientY - startY);
        };

        const onMouseUp = () => {
            setIsDragging(false);
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    };

    return (
        <div 
            ref={nodeRef}
            className={`glass ${isSelected ? 'node-selected' : ''}`}
            style={{
                position: 'absolute',
                left: node.x,
                top: node.y,
                width: node.w,
                height: node.h,
                borderRadius: '12px',
                zIndex: isSelected ? 100 : 1,
                cursor: isDragging ? 'grabbing' : 'grab',
                display: 'flex',
                flexDirection: 'column',
                transition: isDragging ? 'none' : 'border 0.2s'
            }}
            onMouseDown={handleMouseDown}
        >
            {/* Header du Node */}
            <div style={{
                padding: '8px 12px',
                borderBottom: '1px solid var(--border)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                background: 'rgba(255,255,255,0.03)'
            }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: NODE_TYPES[node.type]?.color }}></div>
                    <span style={{ fontSize: '10px', fontWeight: 'bold', letterSpacing: '1px', color: 'var(--text-dim)' }}>
                        {node.type}
                    </span>
                </div>
                <div className="no-drag" style={{ opacity: 0.5 }}>
                    <button onClick={() => onUpdate(node.id, { locked: !node.locked })} style={{ background: 'none', border: 'none', color: 'white', cursor: 'pointer' }}>
                        {node.locked ? '🔒' : '🔓'}
                    </button>
                </div>
            </div>

            {/* Contenu */}
            <div className="no-drag" style={{ flex: 1, padding: '12px', overflow: 'hidden' }}>
                {node.type === 'TEXT' && (
                    <textarea 
                        style={{ width: '100%', height: '100%', background: 'none', border: 'none', color: 'white', outline: 'none', resize: 'none' }}
                        value={node.content}
                        onChange={(e) => onUpdate(node.id, { content: e.target.value })}
                    />
                )}
                {node.type === 'CLOCK' && (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', fontSize: '2rem', fontFamily: 'Fira Code' }}>
                        {new Date().toLocaleTimeString()}
                    </div>
                )}
            </div>
        </div>
    );
};

/* --- APPLICATION PRINCIPALE --- */
const App = () => {
    const [nodes, setNodes] = useState([
        { id: '1', type: 'TEXT', x: 100, y: 100, w: 250, h: 150, content: 'Bienvenue dans Canvas OS Pro !', locked: false },
        { id: '2', type: 'CLOCK', x: 400, y: 100, w: 250, h: 100, locked: false }
    ]);
    const [selectedIds, setSelectedIds] = useState([]);
    const [zoom, setZoom] = useState(1);
    const [pan, setPan] = useState({ x: 0, y: 0 });

    // Fonctions de gestion
    const handleDrag = (id, x, y) => {
        setNodes(nds => nds.map(n => n.id === id ? { ...n, x, y } : n));
    };

    const updateNode = (id, data) => {
        setNodes(nds => nds.map(n => n.id === id ? { ...n, ...data } : n));
    };

    const addNode = (type) => {
        const newNode = {
            id: generateId(),
            type,
            x: Math.random() * 500,
            y: Math.random() * 500,
            w: 250,
            h: 150,
            content: '',
            locked: false
        };
        setNodes([...nodes, newNode]);
    };

    // Rendu
    return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
            {/* TOP BAR */}
            <header className="glass" style={{ height: '60px', display: 'flex', alignItems: 'center', padding: '0 20px', justifyContent: 'space-between', zIndex: 1000 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '15px' }}>
                    <h1 style={{ fontSize: '18px', fontWeight: '800', background: 'linear-gradient(to right, #7c4dff, #00e676)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
                        CANVAS OS PRO
                    </h1>
                </div>
                
                <div style={{ display: 'flex', gap: '10px' }}>
                    <button onClick={() => addNode('TEXT')} style={{ padding: '8px 15px', borderRadius: '6px', background: 'var(--accent)', color: 'white', border: 'none', cursor: 'pointer', fontWeight: '600' }}>
                        + Note
                    </button>
                    <button onClick={() => addNode('CLOCK')} style={{ padding: '8px 15px', borderRadius: '6px', background: 'var(--border)', color: 'white', border: 'none', cursor: 'pointer' }}>
                        + Horloge
                    </button>
                </div>
            </header>

            <main style={{ flex: 1, position: 'relative', overflow: 'hidden', background: 'var(--bg-deep)' }}>
                {/* GRID LAYER */}
                <div className="canvas-grid" style={{
                    position: 'absolute',
                    inset: 0,
                    transform: `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`,
                    transformOrigin: '0 0'
                }}>
                    {nodes.map(node => (
                        <CanvasNode 
                            key={node.id}
                            node={node}
                            isSelected={selectedIds.includes(node.id)}
                            onSelect={(id, shift) => setSelectedIds(shift ? [...selectedIds, id] : [id])}
                            onUpdate={updateNode}
                            onDrag={handleDrag}
                        />
                    ))}
                </div>

                {/* ZOOM CONTROLS */}
                <div style={{ position: 'absolute', bottom: '20px', right: '20px', display: 'flex', gap: '10px' }}>
                    <div className="glass" style={{ padding: '10px', borderRadius: '8px', display: 'flex', gap: '15px', alignItems: 'center' }}>
                        <button onClick={() => setZoom(z => Math.max(0.2, z - 0.1))} style={{ background: 'none', border: 'none', color: 'white', cursor: 'pointer' }}>-</button>
                        <span style={{ fontSize: '12px', fontFamily: 'Fira Code' }}>{Math.round(zoom * 100)}%</span>
                        <button onClick={() => setZoom(z => Math.min(3, z + 0.1))} style={{ background: 'none', border: 'none', color: 'white', cursor: 'pointer' }}>+</button>
                    </div>
                </div>
            </main>

            {/* STATUS BAR */}
            <footer style={{ height: '30px', background: 'rgba(0,0,0,0.5)', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 15px', fontSize: '11px', color: 'var(--text-dim)' }}>
                <span>Objets: {nodes.length}</span>
                <span style={{ marginLeft: '20px' }}>Système : Stable</span>
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
