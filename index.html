<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Canvas OS - Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
    --bg: #050505;
    --panel: #0d0d12;
    --accent: #3b82f6;
    --border: #1e1e2e;
    --text: #ffffff;
    --text-dim: #64748b;
    --node-bg: #0f111a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#root{width:100%;height:100%}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

.canvas-container {
    background-image: 
        radial-gradient(circle at 2px 2px, #1a1a2e 1px, transparent 0);
    background-size: 40px 40px;
    cursor: grab;
}
.canvas-container:active { cursor: grabbing; }

.node {
    position: absolute;
    background: var(--node-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.node.selected {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
    z-index: 100 !important;
}
.node-header {
    padding: 8px 12px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
}
.node-content {
    flex: 1;
    padding: 12px;
    overflow: auto;
}
textarea {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    color: #e2e8f0;
    resize: none;
    outline: none;
    font-size: 14px;
}
.ctx-menu {
    position: fixed;
    background: #161625;
    border: 1px solid #2d2d44;
    border-radius: 6px;
    padding: 5px;
    z-index: 9999;
    box-shadow: 0 5px 20px rgba(0,0,0,0.8);
}
.ctx-item {
    padding: 8px 15px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.ctx-item:hover { background: var(--accent); }

/* Amélioration visibilité : Texte bien blanc sur fond noir */
.text-main { color: #ffffff !important; }
.text-sec { color: #94a3b8 !important; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// --- UTILS ---
const genId = () => Math.random().toString(36).substr(2, 9);

// --- COMPOSANTS ---

const Node = ({ node, isSelected, onSelect, onUpdate, onDel, onConnStart }) => {
    const [isDragging, setIsDragging] = useState(false);
    const startPos = useRef({ x: 0, y: 0 });

    const handleMouseDown = (e) => {
        if (e.target.closest('.no-drag')) return;
        setIsDragging(true);
        onSelect(node.id, e.shiftKey);
        startPos.current = { x: e.clientX - node.x, y: e.clientY - node.y };
        e.stopPropagation();
    };

    useEffect(() => {
        if (!isDragging) return;
        const move = (e) => {
            onUpdate(node.id, { 
                x: e.clientX - startPos.current.x, 
                y: e.clientY - startPos.current.y 
            });
        };
        const stop = () => setIsDragging(false);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', stop); };
    }, [isDragging]);

    return (
        <div 
            className={`node ${isSelected ? 'selected' : ''}`}
            style={{ 
                left: node.x, top: node.y, 
                width: node.w || 250, height: node.h || 180,
                zIndex: node.z || 10
            }}
            onMouseDown={handleMouseDown}
        >
            <div className="node-header">
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: '50%', background: node.color || '#3b82f6' }}></div>
                    <span style={{ fontSize: 11, fontWeight: 600, color: '#94a3b8' }}>{node.type}</span>
                </div>
                <div className="no-drag" style={{ display: 'flex', gap: 5 }}>
                    <button onClick={() => onConnStart(node.id)} style={{ background: 'none', border: 'none', color: '#64748b', cursor: 'pointer' }}>🔗</button>
                    <button onClick={() => onDel(node.id)} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer' }}>×</button>
                </div>
            </div>
            <div className="node-content no-drag">
                <textarea 
                    value={node.content} 
                    onChange={(e) => onUpdate(node.id, { content: e.target.value })}
                    placeholder="Tapez ici..."
                />
            </div>
        </div>
    );
};

const App = () => {
    const [nodes, setNodes] = useState([]);
    const [conns, setConns] = useState([]);
    const [selIds, setSelIds] = useState([]);
    const [vp, setVp] = useState({ x: 0, y: 0, z: 1 });
    const [ctx, setCtx] = useState(null);
    const [linking, setLinking] = useState(null);

    // Initialisation
    useEffect(() => {
        const saved = localStorage.getItem('canvas_os_data');
        if (saved) {
            const data = JSON.parse(saved);
            setNodes(data.nodes || []);
            setConns(data.conns || []);
        }
    }, []);

    // Sauvegarde
    useEffect(() => {
        localStorage.setItem('canvas_os_data', JSON.stringify({ nodes, conns }));
    }, [nodes, conns]);

    const addNode = (type, x, y) => {
        const newNode = {
            id: genId(),
            type: type || 'NOTE',
            x: x || 100,
            y: y || 100,
            w: 250, h: 180,
            content: '',
            color: '#3b82f6',
            z: nodes.length + 1
        };
        setNodes([...nodes, newNode]);
        setCtx(null);
    };

    const updNode = (id, data) => {
        setNodes(nds => nds.map(n => n.id === id ? { ...n, ...data } : n));
    };

    const delNode = (id) => {
        setNodes(nds => nds.filter(n => n.id !== id));
        setConns(cs => cs.filter(c => c.from !== id && c.to !== id));
    };

    const handleConn = (targetId) => {
        if (linking && linking !== targetId) {
            setConns([...conns, { id: genId(), from: linking, to: targetId }]);
            setLinking(null);
        } else {
            setLinking(targetId);
        }
    };

    // Rendu des lignes de connexion
    const renderConnections = () => {
        return conns.map(c => {
            const n1 = nodes.find(n => n.id === c.from);
            const n2 = nodes.find(n => n.id === c.to);
            if (!n1 || !n2) return null;
            return (
                <line 
                    key={c.id}
                    x1={n1.x + 125} y1={n1.y + 90}
                    x2={n2.x + 125} y2={n2.y + 90}
                    stroke="rgba(59, 130, 246, 0.4)"
                    strokeWidth="2"
                />
            );
        });
    };

    return (
        <div 
            className="canvas-container"
            style={{ width: '100%', height: '100%', position: 'relative', overflow: 'hidden' }}
            onContextMenu={(e) => { e.preventDefault(); setCtx({ x: e.clientX, y: e.clientY }); }}
            onMouseDown={() => { setSelIds([]); setCtx(null); }}
        >
            {/* SVG Layer pour les connexions */}
            <svg style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
                {renderConnections()}
            </svg>

            {/* Nodes Layer */}
            <div style={{ transform: `translate(${vp.x}px, ${vp.y}px) scale(${vp.z})`, transformOrigin: '0 0' }}>
                {nodes.map(n => (
                    <Node 
                        key={n.id} 
                        node={n} 
                        isSelected={selIds.includes(n.id)}
                        onSelect={(id, shift) => setSelIds(shift ? [...selIds, id] : [id])}
                        onUpdate={updNode}
                        onDel={delNode}
                        onConnStart={handleConn}
                    />
                ))}
            </div>

            {/* UI Overlay */}
            <div style={{ position: 'absolute', top: 20, left: 20, pointerEvents: 'none' }}>
                <h1 style={{ fontSize: 24, fontWeight: 800, color: 'white', letterSpacing: -1 }}>
                    CANVAS <span style={{ color: '#3b82f6' }}>OS</span>
                </h1>
                <p style={{ fontSize: 12, color: '#64748b' }}>Version 2.0 - {nodes.length} objets</p>
            </div>

            {/* Barre de contrôle en bas */}
            <div style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 10, background: '#11111a', padding: '10px 20px', borderRadius: '50px', border: '1px solid #222', boxShadow: '0 10px 30px rgba(0,0,0,0.5)' }}>
                <button onClick={() => addNode('NOTE')} style={{ background: 'none', border: 'none', color: 'white', cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>+ Note</button>
                <div style={{ width: 1, height: 20, background: '#333' }}></div>
                <button onClick={() => setNodes([])} style={{ background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer', fontSize: 13 }}>Tout effacer</button>
            </div>

            {/* Menu Contextuel */}
            {ctx && (
                <div className="ctx-menu" style={{ left: ctx.x, top: ctx.y }}>
                    <div className="ctx-item" onClick={() => addNode('NOTE', ctx.x, ctx.y)}>📝 Nouvelle Note</div>
                    <div className="ctx-item" onClick={() => addNode('CODE', ctx.x, ctx.y)}>💻 Bloc Code</div>
                    <div className="ctx-item" onClick={() => setVp({ x: 0, y: 0, z: 1 })}>🎯 Recentrer</div>
                </div>
            )}

            {linking && (
                <div style={{ position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)', background: '#3b82f6', color: 'white', padding: '5px 15px', borderRadius: '20px', fontSize: 12, fontWeight: 600 }}>
                    Clique sur un autre nœud pour lier
                </div>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
