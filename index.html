<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title>MONOLITH OS - 40+ FUNCTIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --fg: #fff; --font-mono: 'JetBrains Mono', monospace; --font-sans: 'Inter', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--fg); font-family: var(--font-sans); }

        #desktop { width: 100vw; height: 100vh; position: relative; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }

        /* FENETRES */
        .win { position: absolute; background: var(--bg); border: 2px solid var(--fg); display: flex; flex-direction: column; box-shadow: 6px 6px 0 var(--fg); min-width: 180px; }
        .win.active { box-shadow: 12px 12px 0 var(--fg); z-index: 1000 !important; }
        .win-header { background: var(--fg); color: var(--bg); padding: 5px 10px; font-family: var(--font-mono); font-size: 11px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; cursor: move; }
        .win-body { flex: 1; padding: 10px; overflow: auto; position: relative; }
        
        /* UI ELEMENTS */
        .btn { background: var(--bg); border: 1px solid var(--fg); color: var(--fg); padding: 4px 10px; font-size: 10px; font-family: var(--font-mono); cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: var(--fg); color: var(--bg); }
        textarea, input { background: transparent; border: none; color: var(--fg); width: 100%; font-family: var(--font-sans); outline: none; }
        
        /* TASKBAR */
        #taskbar { position: fixed; bottom: 0; width: 100%; height: 40px; background: var(--bg); border-top: 2px solid var(--fg); display: flex; align-items: center; padding: 0 15px; z-index: 9999; }
        .task-item { border: 1px solid #333; padding: 4px 12px; margin-right: 10px; font-size: 11px; cursor: pointer; }
        .task-item.active { border-color: var(--fg); font-weight: bold; }

        /* SVG LINES */
        #connections { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const MOD_TYPES = {
            TEXT: { label: "Note", icon: "📄", w: 300, h: 200 },
            TERM: { label: "Terminal", icon: ">_", w: 500, h: 300 },
            DRAW: { label: "Art", icon: "🎨", w: 350, h: 350 },
            CALC: { label: "Math", icon: "±", w: 200, h: 280 },
            TODO: { label: "Tasks", icon: "✓", w: 250, h: 350 }
        };

        const App = () => {
            const [mods, setMods] = useState([]);
            const [links, setLinks] = useState([]);
            const [activeId, setActiveId] = useState(null);
            const [linkingFrom, setLinkingFrom] = useState(null);
            const [toasts, setToasts] = useState([]);

            // 1. GESTION DES MODULES
            const addMod = (type, x = 100, y = 100) => {
                const id = 'mod_' + Date.now();
                setMods([...mods, { id, type, x, y, w: MOD_TYPES[type].w, h: MOD_TYPES[type].h, data: "", z: mods.length + 10 }]);
                addToast(`Module ${type} ajouté`);
            };

            const updMod = (id, obj) => setMods(prev => prev.map(m => m.id === id ? {...m, ...obj} : m));

            const delMod = (id) => {
                setMods(prev => prev.filter(m => m.id !== id));
                setLinks(prev => prev.filter(l => l.from !== id && l.to !== id));
            };

            // 2. SYSTEME DE LIENS (INTER-MODULES)
            const startLink = (id) => {
                if (linkingFrom) {
                    if (linkingFrom !== id) {
                        setLinks([...links, { id: Date.now(), from: linkingFrom, to: id }]);
                        addToast("Lien créé");
                    }
                    setLinkingFrom(null);
                } else {
                    setLinkingFrom(id);
                    addToast("Sélectionnez la cible");
                }
            };

            // 3. DRAG LOGIQUE
            const handleDrag = (id, e) => {
                setActiveId(id);
                const mod = mods.find(m => m.id === id);
                const startX = e.clientX - mod.x;
                const startY = e.clientY - mod.y;

                const onMove = (me) => {
                    const nx = Math.round((me.clientX - startX) / 20) * 20;
                    const ny = Math.round((me.clientY - startY) / 20) * 20;
                    updMod(id, { x: nx, y: ny });
                };
                const onStop = () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onStop);
                };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onStop);
            };

            // 4. TOAST SYSTEM
            const addToast = (msg) => {
                const id = Date.now();
                setToasts(prev => [...prev, {id, msg}]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            // 5. RENDU DES LIGNES
            const renderLinks = () => {
                return links.map(l => {
                    const m1 = mods.find(m => m.id === l.from);
                    const m2 = mods.find(m => m.id === l.to);
                    if (!m1 || !m2) return null;
                    return <line key={l.id} x1={m1.x + m1.w/2} y1={m1.y + m1.h/2} x2={m2.x + m2.w/2} y2={m2.y + m2.h/2} stroke="#fff" strokeWidth="1" strokeDasharray="4" />;
                });
            };

            return (
                <div id="desktop" onMouseDown={() => setActiveId(null)}>
                    <svg id="connections">{renderLinks()}</svg>

                    {mods.map(m => (
                        <div key={m.id} className={`win ${activeId === m.id ? 'active' : ''}`} 
                             style={{ left: m.x, top: m.y, width: m.w, height: m.h, zIndex: m.z }}
                             onMouseDown={(e) => { e.stopPropagation(); setActiveId(m.id); }}>
                            
                            <div className="win-header" onMouseDown={(e) => handleDrag(m.id, e)}>
                                <span>{MOD_TYPES[m.type].icon} {MOD_TYPES[m.type].label}</span>
                                <div style={{display:'flex', gap:5}}>
                                    <button className="btn" style={{padding:'0 4px'}} onClick={() => startLink(m.id)}>🔗</button>
                                    <button className="btn" style={{padding:'0 4px'}} onClick={() => delMod(m.id)}>X</button>
                                </div>
                            </div>

                            <div className="win-body">
                                {m.type === 'TEXT' && (
                                    <div style={{height:'100%', display:'flex', flexDirection:'column'}}>
                                        <textarea style={{flex:1}} value={m.data} onChange={e => updMod(m.id, {data: e.target.value})} placeholder="Note..." />
                                        <div style={{fontSize:9, borderTop:'1px solid #222', paddingTop:4}}>
                                            WORDS: {m.data.split(/\s+/).filter(x => x).length} | CHARS: {m.data.length}
                                        </div>
                                    </div>
                                )}
                                {m.type === 'TERM' && <Terminal onCmd={(cmd) => handleTerm(cmd, addMod)} />}
                                {m.type === 'DRAW' && <CanvasDraw />}
                                {m.type === 'TODO' && <TodoMod />}
                                {m.type === 'CALC' && <CalcMod />}
                            </div>

                            <div style={{position:'absolute', bottom:0, right:0, width:10, height:10, cursor:'nwse-resize', background:'#fff'}}
                                 onMouseDown={(e) => {
                                     e.stopPropagation();
                                     const sW = m.w; const sH = m.h; const sX = e.clientX; const sY = e.clientY;
                                     const rs = (me) => updMod(m.id, { w: sW + (me.clientX-sX), h: sH + (me.clientY-sY) });
                                     const rstop = () => { window.removeEventListener('mousemove', rs); window.removeEventListener('mouseup', rstop); };
                                     window.addEventListener('mousemove', rs); window.addEventListener('mouseup', rstop);
                                 }} />
                        </div>
                    ))}

                    <div style={{position:'fixed', top:10, right:10, display:'flex', flexDirection:'column', gap:5}}>
                        {toasts.map(t => <div key={t.id} style={{background:'#fff', color:'#000', padding:'4px 10px', fontSize:11, fontWeight:'bold'}}>{t.msg}</div>)}
                    </div>

                    <footer id="taskbar">
                        <button className="btn" style={{fontWeight:900, marginRight:20}} onClick={() => addMod('TEXT')}>+ MODULE</button>
                        <div style={{flex:1, display:'flex'}}>
                            {mods.map(m => (
                                <div key={m.id} className={`task-item ${activeId === m.id ? 'active' : ''}`} onClick={() => setActiveId(m.id)}>
                                    {MOD_TYPES[m.type].label}
                                </div>
                            ))}
                        </div>
                        <div style={{fontFamily:'JetBrains Mono', fontSize:12}}>{new Date().toLocaleTimeString()}</div>
                    </footer>
                </div>
            );
        };

        // --- MODULES SPECIFIQUES ---

        const Terminal = ({ onCmd }) => {
            const [history, setHistory] = useState(["> MONOLITH CORE READY", "> TYPE 'HELP'"]);
            const [val, setVal] = useState("");
            const run = (e) => {
                if (e.key === 'Enter') {
                    const c = val.toLowerCase().trim();
                    setHistory([...history, `$ ${val}`]);
                    if (c === 'help') setHistory(prev => [...prev, "> CMDS: note, draw, task, math, clear, kill-all"]);
                    if (c === 'note') onCmd('TEXT');
                    if (c === 'draw') onCmd('DRAW');
                    if (c === 'task') onCmd('TODO');
                    if (c === 'math') onCmd('CALC');
                    if (c === 'clear') setHistory([]);
                    setVal("");
                }
            };
            return (
                <div style={{fontFamily:'var(--font-mono)', fontSize:11, color:'#fff'}}>
                    {history.map((h,i) => <div key={i}>{h}</div>)}
                    <div style={{display:'flex'}}>> <input style={{color:'#fff', marginLeft:5}} value={val} onChange={e => setVal(e.target.value)} onKeyDown={run} autoFocus /></div>
                </div>
            );
        };

        const CanvasDraw = () => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const draw = (e) => {
                if (!isDrawing) return;
                const ctx = canvasRef.current.getContext('2d');
                const r = canvasRef.current.getBoundingClientRect();
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                ctx.stroke();
            };
            useEffect(() => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            }, []);
            return (
                <div style={{height:'100%', display:'flex', flexDirection:'column'}}>
                    <button className="btn" style={{marginBottom:5}} onClick={() => canvasRef.current.getContext('2d').clearRect(0,0,1000,1000)}>Clear</button>
                    <canvas ref={canvasRef} width="500" height="500" style={{flex:1, background:'#000'}} onMouseDown={(e) => { setIsDrawing(true); canvasRef.current.getContext('2d').beginPath(); }} onMouseMove={draw} onMouseUp={() => setIsDrawing(false)} />
                </div>
            );
        };

        const TodoMod = () => {
            const [tasks, setTasks] = useState([]);
            const [v, setV] = useState("");
            const add = (e) => { if (e.key === 'Enter' && v) { setTasks([...tasks, {id:Date.now(), t:v, d:false}]); setV(""); } };
            return (
                <div>
                    <input style={{borderBottom:'1px solid #333', marginBottom:10, paddingBottom:5}} value={v} onChange={e => setV(e.target.value)} onKeyDown={add} placeholder="New task..." />
                    {tasks.map(t => (
                        <div key={t.id} style={{display:'flex', gap:10, fontSize:12, marginBottom:4, textDecoration: t.d ? 'line-through' : 'none', color: t.d ? '#555' : '#fff'}}>
                            <input type="checkbox" onChange={() => setTasks(tasks.map(x => x.id === t.id ? {...x, d:!x.d} : x))} /> {t.t}
                        </div>
                    ))}
                </div>
            );
        };

        const CalcMod = () => {
            const [exp, setExp] = useState("");
            const [res, setRes] = useState("");
            const solve = () => { try { setRes(eval(exp)); } catch { setRes("ERR"); } };
            return (
                <div style={{fontFamily:'var(--font-mono)'}}>
                    <input style={{fontSize:18, textAlign:'right', marginBottom:10}} value={exp} onChange={e => setExp(e.target.value)} placeholder="0" />
                    <div style={{fontSize:24, textAlign:'right', fontWeight:'bold', marginBottom:10}}>{res}</div>
                    <button className="btn" style={{width:'100%'}} onClick={solve}>CALCULATE</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
